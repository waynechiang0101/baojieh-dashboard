<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>寶捷實業 FMCG 管理系統</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#e8eaf2;font-family:"Noto Sans TC",sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
.logo{font-size:13px;font-family:"IBM Plex Mono",monospace;color:#6c8ef5;letter-spacing:.06em;margin-bottom:8px;text-align:center}
h1{font-size:28px;font-weight:700;text-align:center;margin-bottom:6px}
.sub{font-size:14px;color:#8892b0;text-align:center;margin-bottom:40px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:640px;width:100%}
.card{background:#161a24;border:1px solid #2a3050;border-radius:14px;padding:28px 24px;text-decoration:none;color:inherit;transition:all .2s;display:block}
.card:hover{border-color:#6c8ef5;background:#1e2436;transform:translateY(-2px)}
.card-icon{font-size:32px;margin-bottom:14px}
.card-title{font-size:17px;font-weight:700;margin-bottom:6px}
.card-desc{font-size:13px;color:#8892b0;line-height:1.6;margin-bottom:16px}
.card-tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-family:"IBM Plex Mono",monospace}
.tag-blue{background:rgba(79,163,224,.15);color:#4fa3e0}
.tag-green{background:rgba(76,175,130,.15);color:#4caf82}
.footer{margin-top:32px;font-size:11px;color:#4a5580;font-family:"IBM Plex Mono",monospace;text-align:center}
</style>
</head>
<body>
<div class="logo">FMCG.SYS v4.0 · 寶捷實業有限公司</div>
<h1>管理系統</h1>
<div class="sub">P&G · 3M · Pringles 經銷商 · 內部使用</div>
<div class="cards">
  <a class="card" href="dashboard.html">
    <div class="card-icon">&#128202;</div>
    <div class="card-title">業績儀表板</div>
    <div class="card-desc">業績總覽、品牌分析、業代排行、收款狀況。月 / 季 / IYA 對比一目瞭然。</div>
    <span class="card-tag tag-blue">Power BI 風格</span>
  </a>
  <a class="card" href="matcher.html">
    <div class="card-icon">&#128260;</div>
    <div class="card-title">康是美實銷比對</div>
    <div class="card-desc">上傳鼎新 ERP 和康是美實銷檔案，AI 自動條碼比對，輸出 P&G 格式 CSV。</div>
    <span class="card-tag tag-green">AI 自動比對</span>
  </a>
</div>
<div class="footer">僅供內部使用 · 請勿對外分享系統網址</div>
</body>
</html>
