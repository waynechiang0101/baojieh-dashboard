name: 每日更新看板

on:
  schedule:
    - cron: '30 10 * * 1-5'  # 台灣時間 18:30（UTC+8），週一到週五
  workflow_dispatch:          # 手動觸發按鈕

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 設定 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安裝套件
        run: pip install requests xlrd openpyxl anthropic playwright

      - name: 安裝 Playwright 瀏覽器（週一才需要）
        if: github.event_name == 'workflow_dispatch' || github.event.schedule != ''
        run: |
          DAY=$(date +%u)
          if [ "$DAY" = "1" ]; then
            playwright install chromium
          fi

      - name: 執行更新腳本
        env:
          DERP_USER: ${{ secrets.DERP_USER }}
          DERP_PASS: ${{ secrets.DERP_PASS }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          IWMS_SECRET: ${{ secrets.IWMS_SECRET }}
run: python scripts/derp_fetch.py

      - name: 提交更新
        run: |
          git config user.name "Dashboard Bot"
          git config user.email "bot@bjworks.com"
          git add dashboard.html data/sr_pending.json data/brand_pl_monthly.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "📊 自動更新看板 $(date +'%Y-%m-%d %H:%M')"
          git push
